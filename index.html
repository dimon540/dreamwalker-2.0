<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreamwalker</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- МЕНЮ -->
<div id="menu" class="screen active">

    <h1>DREAMWALKER</h1>

    <button onclick="show('creator')">Новая игра</button>
    <button onclick="show('saves')">Продолжить</button>
    <button onclick="alert('Настройки позже')">Настройки</button>

</div>

<!-- СОЗДАНИЕ ПЕРСОНАЖА -->
<div id="creator" class="screen hidden">

    <h2>Создание персонажа</h2>

    <div id="preview"></div>

    <input id="name" placeholder="Имя (Акира)" oninput="update()" />

    <label>Волосы</label>
    <select id="hair" onchange="update()">
        <option value="Короткие">Короткие</option>
        <option value="Длинные">Длинные</option>
        <option value="Хвост">Хвост</option>
    </select>

    <label>Цвет волос</label>
    <select id="hairColor" onchange="update()">
        <option value="Чёрные">Чёрные</option>
        <option value="Коричневые">Коричневые</option>
        <option value="Блондин">Блондин</option>
        <option value="Рыжие">Рыжие</option>
        <option value="Белые">Белые</option>
        <option value="Синие">Синие</option>
        <option value="Серебро">Серебро</option>
    </select>

    <label>Глаза</label>
    <select id="eyes" onchange="update()">
        <option value="Голубые">Голубые</option>
        <option value="Карие">Карие</option>
        <option value="Зелёные">Зелёные</option>
        <option value="Серые">Серые</option>
    </select>

    <label>Кожа</label>
    <select id="skin" onchange="update()">
        <option value="Светлая">Светлая</option>
        <option value="Средняя">Средняя</option>
        <option value="Тёмная">Тёмная</option>
    </select>

    <button onclick="create()">Создать персонажа</button>
    <button onclick="show('menu')">Назад</button>

</div>

<!-- СОХРАНЕНИЯ -->
<div id="saves" class="screen hidden">

    <h2>Сохранения</h2>

    <div class="slot" id="saveSlot">Пусто</div>

    <button onclick="show('menu')">Назад</button>

</div>

<script src="script.js"></script>

</body>
</html>
