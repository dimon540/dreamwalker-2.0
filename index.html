<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreamwalker</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="menu">

        <h1>DREAMWALKER</h1>

        <button onclick="newGame()">
            Новая игра
        </button>

        <button onclick="continueGame()">
            Продолжить
        </button>

        <button onclick="settings()">
            Настройки
        </button>

        <div id="version">
            Alpha 0.1
        </div>

    </div>

    <script>

        function newGame() {
            alert("Создание персонажа будет здесь");
        }

        function continueGame() {
            alert("Сохранения пока отсутствуют");
        }

        function settings() {
            alert("Настройки будут добавлены позже");
        }

    </script>

</body>
</html>
