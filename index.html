<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreamwalker</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0a0f1f;
    color: white;
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.menu {
    text-align: center;
}

h1 {
    font-size: 64px;
    margin-bottom: 40px;
    letter-spacing: 3px;
}

button {
    display: block;
    width: 250px;
    margin: 15px auto;
    padding: 15px;
    font-size: 20px;
    background: #1c2b52;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #314d91;
    transform: scale(1.05);
}

#version {
    margin-top: 30px;
    color: gray;
}
</style>
</head>

<body>

<div class="menu">
    <h1>DREAMWALKER</h1>

    <button onclick="newGame()">Новая игра</button>

    <button onclick="continueGame()">Продолжить</button>

    <button onclick="settings()">Настройки</button>

    <div id="version">
        Alpha 0.1
    </div>
</div>

<script>
function newGame() {
    alert("Создание персонажа будет здесь");
}

function continueGame() {
    alert("Сохранения пока отсутствуют");
}

function settings() {
    alert("Настройки будут добавлены позже");
}
</script>

</body>
</html>
