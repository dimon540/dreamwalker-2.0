<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreamwalker</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- МЕНЮ -->
<div id="menu" class="screen">

    <h1>DREAMWALKER</h1>

    <button onclick="show('creator')">Новая игра</button>
    <button onclick="show('saves')">Продолжить</button>
    <button onclick="show('settings')">Настройки</button>

</div>

<!-- СОЗДАНИЕ ХАРАКТЕРА -->
<div id="creator" class="screen hidden">

    <h2>Создание характера</h2>

    <input id="name" placeholder="Имя (Ева)" oninput="update()" />

    <label>Логика</label>
    <input type="range" id="logic" min="1" max="10" value="5" oninput="update()">

    <label>Эмпатия</label>
    <input type="range" id="empathy" min="1" max="10" value="5" oninput="update()">

    <label>Смелость</label>
    <input type="range" id="bravery" min="1" max="10" value="5" oninput="update()">

    <label>Спокойствие</label>
    <input type="range" id="calmness" min="1" max="10" value="5" oninput="update()">

    <div id="preview"></div>

    <button onclick="create()">Начать историю</button>
    <button onclick="show('menu')">Назад</button>

</div>

<!-- ИГРА -->
<div id="game" class="screen hidden">

    <div id="gameContainer">

        <div id="dialogBox">

            <div id="speaker"></div>

            <div id="dialogText"></div>

            <button onclick="nextScene()">Далее</button>

        </div>

    </div>

</div>

<!-- СОХРАНЕНИЯ -->
<div id="saves" class="screen hidden">
    <h2>Сохранения</h2>
    <div id="saveSlot">Пусто</div>
    <button onclick="show('menu')">Назад</button>
</div>

<!-- НАСТРОЙКИ -->
<div id="settings" class="screen hidden">
    <h2>Настройки</h2>

    <label>Музыка</label>
    <input type="range">

    <label>Эффекты</label>
    <input type="range">

    <button onclick="show('menu')">Назад</button>
</div>

<script src="script.js"></script>

</body>
</html>
