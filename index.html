<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreamwalker</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- ГЛАВНОЕ МЕНЮ -->
<div id="menu" class="screen">

    <h1>DREAMWALKER</h1>

    <button onclick="show('creator')">Новая игра</button>
    <button onclick="show('saves')">Продолжить</button>
    <button onclick="show('settings')">Настройки</button>

</div>

<!-- СОЗДАНИЕ ХАРАКТЕРА -->
<div id="creator" class="screen hidden">

    <h2>Создание характера</h2>

    <input id="name" placeholder="Имя (Ева)" oninput="update()" />

    <label>🧠 Логика</label>
    <input type="range" id="logic" min="1" max="10" value="5" oninput="update()">

    <label>❤️ Эмпатия</label>
    <input type="range" id="empathy" min="1" max="10" value="5" oninput="update()">

    <label>🔥 Смелость</label>
    <input type="range" id="bravery" min="1" max="10" value="5" oninput="update()">

    <label>😶 Спокойствие</label>
    <input type="range" id="calmness" min="1" max="10" value="5" oninput="update()">

    <div id="preview"></div>

    <button onclick="create()">Начать историю</button>
    <button onclick="show('menu')">Назад</button>

</div>

<!-- СОХРАНЕНИЯ -->
<div id="saves" class="screen hidden">

    <h2>Сохранения</h2>

    <div id="saveSlot">Пусто</div>

    <button onclick="show('menu')">Назад</button>

</div>

<!-- НАСТРОЙКИ -->
<div id="settings" class="screen hidden">

    <h2>Настройки</h2>

    <label>🔊 Музыка</label>
    <input type="range" id="musicVolume" min="0" max="100" value="70">

    <label>🔔 Эффекты</label>
    <input type="range" id="sfxVolume" min="0" max="100" value="70">

    <label>📝 Скорость текста</label>
    <select id="textSpeed">
        <option>Медленно</option>
        <option selected>Нормально</option>
        <option>Быстро</option>
    </select>

    <label>🔤 Размер текста</label>
    <select id="textSize">
        <option>Маленький</option>
        <option selected>Средний</option>
        <option>Большой</option>
    </select>

    <label>🎬 Анимации</label>
    <select id="animations">
        <option selected>Включены</option>
        <option>Выключены</option>
    </select>

    <label>▶ Автопрокрутка</label>
    <select id="autoplay">
        <option selected>Выключена</option>
        <option>Включена</option>
    </select>

    <button onclick="saveSettings()">Сохранить настройки</button>
    <button onclick="show('menu')">Назад</button>

</div>

<script src="script.js"></script>

</body>
</html>
