<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dreamwalker</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- МЕНЮ -->
<div id="menu" class="screen">
    <h1>DREAMWALKER</h1>

    <button onclick="show('creator')">Новая игра</button>
    <button onclick="show('saves')">Продолжить</button>
    <button onclick="alert('Позже')">Настройки</button>
</div>

<!-- СОЗДАНИЕ ПЕРСОНАЖА -->
<div id="creator" class="screen hidden">

    <h2>Создание персонажа</h2>

    <div id="preview"></div>

    <input id="name" placeholder="Имя (Акира)" oninput="update()" />

    <label>Волосы</label>
    <select id="hair" onchange="update()">
        <option value="hair1.png">Короткие</option>
        <option value="hair2.png">Длинные</option>
        <option value="hair3.png">Хвост</option>
    </select>
    <label>Цвет волос</label>
<select id="hairColor" onchange="update()">
    <option value="black">Чёрные</option>
    <option value="brown">Коричневые</option>
    <option value="blonde">Блондин</option>
    <option value="red">Рыжие</option>
    <option value="white">Белые</option>
    <option value="blue">Синие</option>
    <option value="silver">Серебро</option>
</select>

    <label>Глаза</label>
    <select id="eyes" onchange="update()">
        <option value="eyes1.png">Голубые</option>
        <option value="eyes2.png">Карие</option>
        <option value="eyes3.png">Зелёные</option>
    </select>

    <label>Кожа</label>
    <select id="skin" onchange="update()">
        <option value="skin1.png">Светлая</option>
        <option value="skin2.png">Средняя</option>
        <option value="skin3.png">Тёмная</option>
    </select>

    <button onclick="create()">Создать персонажа</button>
    <button onclick="show('menu')">Назад</button>

</div>

<!-- СОХРАНЕНИЯ -->
<div id="saves" class="screen hidden">

    <h2>Сохранения</h2>

    <div class="slot">Пусто</div>
    <div class="slot">Пусто</div>
    <div class="slot">Пусто</div>

    <button onclick="show('menu')">Назад</button>

</div>

<script src="script.js"></script>

</body>
</html>
